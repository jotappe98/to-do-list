<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style/style.css">
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" 
    />
    <script src="javascript/script.js" defer></script>
</head>
<body>
    <div class="todo-container">
        <header>
             <h1>Lista de tarefas</h1>
               <div class="theme-toggle">
                    <input type="checkbox" id="theme-toggle">
                    <label for="theme-toggle" class="toggle-label">
                        <span class="toggle-ball">
                            <i class="fa-solid fa-sun"></i>
                        </span>
                    </label>
                </div>
        </header>
        <form  id="todo-form">
            <p>Adicione uma tarefa</p>
            
            <div class="form-control">
                <input type="text" id="todo-input" placeholder="O que você vai fazer?" autocomplete="off">
                <button type="submit">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            
        </form>
        <form  id="edit-form" class="hide">
            <p>Editar tarefa</p>
            <div class="form-control">
                <input type="text" id="edit-input" placeholder="O que você quer editar?" autocomplete="off">
                <button type="submit">
                    <i class="fa-solid fa-check-double"></i>
                </button>
            </div>
            <button id="cancel-edit-btn">Cancelar edição</button>
        </form>

        <div id="toolbar">
            <div class="search">
                <h4>Pesquisar:</h4>
                <form>
                    <input type="text" id="search-input" placeholder="Buscar" autocomplete="off">
                    <button id="erase-button">
                        <i class="fa-solid fa-delete-left"></i>
                    </button>
                </form>
            </div>
            <div class="filter">
                <h4>Filtrar:</h4>
                <select id="filter-select">
                    <option value="all">Todas</option>
                    <option value="done">Concluídas</option>
                    <option value="todo">Pendentes</option>
                </select>
            </div>
        </div>

        <p id="empty-state">O que vamos fazer hoje?</p>

        <div id="todo-list">
            <!-- <div class="todo done">
                <h3>Alguma tarefa...</h3>
                <button class="finish-todo">
                    <i class="fa-solid fa-check"></i>
                </button>
                 <button class="edit-todo">
                    <i class="fa-solid fa-pen"></i>
                </button>
                 <button class="remove-todo">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="todo">
                <h3>Outra tarefa...</h3>
                <button class="finish-todo">
                    <i class="fa-solid fa-check"></i>
                </button>
                 <button class="edit-todo">
                    <i class="fa-solid fa-pen"></i>
                </button>
                 <button class="remove-todo">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div> -->

            <p id="no-results" style="display: none; text-align: center; font-weight: bold; color:#0f172a ;">Nenhuma tarefa encontrada</p>
        </div>
    </div>   
</body>
</html>
